services:
  # ---------------------------------------------
  # BACKEND: Express Node API (Web Service)
  # ---------------------------------------------
  - type: web
    name: tesla-api
    plan: free
    env: node
    buildCommand: "npm install && npm run build -w @tesla/shared && npm run build -w backend"
    startCommand: "npm run start --prefix backend"
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production

  # ---------------------------------------------
  # FRONTEND: React Application (Static Site)
  # ---------------------------------------------
  - type: web
    name: tesla-dashboard
    env: static
    buildCommand: "npm install && npm run build -w @tesla/shared && npm run build -w frontend"
    staticPublishPath: "./frontend/build"
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: tesla-api
          envVarKey: RENDER_EXTERNAL_URL
